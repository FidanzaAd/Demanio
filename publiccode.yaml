# Informazioni base
name: Agenzia del Demanio - Risorse Semantiche NDC
applicationSuite: National Data Catalog
url: https://github.com/Agenzia-del-Demanio/NDC
landingURL: https://github.com/Agenzia-del-Demanio/NDC

# Organizzazione
